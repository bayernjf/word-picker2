<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WordCatcher 单词本</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="toolbar">
        <div>
          <h1>WordCatcher</h1>
          <p>快速回顾已保存单词</p>
        </div>
      </header>

      <section class="controls">
        <input id="search-input" type="search" placeholder="搜索单词、释义、来源..." />
        <div class="export-actions">
          <button id="export-json" type="button">导出 JSON</button>
          <button id="export-csv" type="button">导出 CSV</button>
        </div>
      </section>

      <section id="status" class="status" aria-live="polite"></section>
      <section id="word-list" class="word-list"></section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
